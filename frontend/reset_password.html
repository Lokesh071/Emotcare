<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EmotiCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="paper-background">
        <div class="auth-container">
            <div class="cute-card auth-card">
                <div class="card-decoration">
                    <span class="decoration-element rainbow">🌈</span>
                    <span class="decoration-element sun">☀️</span>
                    <span class="decoration-element flower">🌸</span>
                </div>
                
                <div style="text-align: center;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🔐</div>
                    <h1 class="form-title">Reset Your Password</h1>
                    
                    <div id="messageContainer" class="message-container" style="display: none;"></div>
                    
                    <form id="resetPasswordForm" class="auth-form">
                        <input type="hidden" id="resetToken" value="{{ token }}">
                        
                        <div class="input-group">
                            <label for="newPassword">New Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="newPassword" required class="cute-input" minlength="8">
                                <span class="toggle-password" data-target="newPassword">👁️</span>
                            </div>
                            <div id="passwordStrength" class="password-strength"></div>
                        </div>
                        
                        <div class="input-group">
                            <label for="confirmNewPassword">Confirm New Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="confirmNewPassword" required class="cute-input">
                                <span class="toggle-password" data-target="confirmNewPassword">👁️</span>
                            </div>
                        </div>
                        
                        <button type="submit" id="resetSubmit" class="cute-button primary auth-button">
                            <span class="button-emoji">🔄</span>
                            Reset Password
                        </button>
                    </form>
                    
                    <div class="auth-switch">
                        <p>Remember your password? <a href="{{ url_for('index') }}" class="switch-link">Back to Login 🏠</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/reset-password.js') }}"></script>
</body>
</html>

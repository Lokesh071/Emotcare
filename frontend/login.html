<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotiCare - Sign In</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="paper-background">
        <div class="auth-container">
            <div class="cute-card auth-card">
                <div class="card-decoration">
                    <span class="decoration-element rainbow">🌈</span>
                    <span class="decoration-element sun">☀️</span>
                    <span class="decoration-element flower">🌸</span>
                </div>
                
                <h1 class="form-title">Welcome Back! 😊</h1>
                
                <div id="messageContainer" class="message-container" style="display: none;"></div>
                
                <!-- Login Form -->
                <div id="loginFormContainer">
                    <form id="loginForm" class="auth-form">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required class="cute-input">
                        </div>
                        
                        <div class="input-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" required class="cute-input">
                            <div id="passwordStrength" class="password-strength"></div>
                        </div>
                        
                        <button type="submit" id="loginSubmit" class="cute-button primary auth-button" data-original-text="Sign In">
                            <span class="button-emoji">🚀</span>
                            Sign In
                        </button>
                    </form>
                    
                    <div class="auth-switch">
                        <p>New to EmotiCare? <a href="#" id="showRegister" class="switch-link">Create an account! 🌟</a></p>
                    </div>
                </div>
                
                <!-- Register Form -->
                <div id="registerFormContainer" style="display: none;">
                    <form id="registerForm" class="auth-form">
                        <div class="input-group">
                            <label for="registerUsername">Username</label>
                            <input type="text" id="registerUsername" required class="cute-input" minlength="3">
                        </div>
                        
                        <div class="input-group">
                            <label for="registerEmail">Email Address</label>
                            <input type="email" id="registerEmail" required class="cute-input">
                        </div>
                        
                        <div class="input-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" required class="cute-input" minlength="8">
                            <div id="registerPasswordStrength" class="password-strength"></div>
                        </div>
                        
                        <div class="input-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" required class="cute-input">
                        </div>
                        
                        <button type="submit" id="registerSubmit" class="cute-button primary auth-button" data-original-text="Create Account">
                            <span class="button-emoji">✨</span>
                            Create Account
                        </button>
                    </form>
                    
                    <div class="auth-switch">
                        <p>Already have an account? <a href="#" id="showLogin" class="switch-link">Sign in here! 👋</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>

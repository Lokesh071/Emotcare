<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotiCare - Profile</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="paper-background">
        <header class="cute-header">
            <div class="logo-container">
                <div class="cute-logo">
                    <img src="{{ url_for('static', filename='assets/logo.png') }}"
                         alt="EmotiCare Logo"
                         class="logo-image"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
                    <span class="emoji-face">👤</span>
                    <h1>Profile</h1>
                </div>
            </div>
            <nav class="paper-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-button">Dashboard</a>
                <a href="{{ url_for('analytics') }}" class="nav-button">Analytics</a>
                <a href="#" onclick="logout()" class="nav-button logout-btn">Logout</a>
            </nav>
        </header>
        <main class="main-content">
            <section class="profile-section">
                <div class="cute-card profile-card">
                    <div class="card-decoration">
                        <span class="decoration-element rainbow">🌈</span>
                        <span class="decoration-element sun">☀️</span>
                        <span class="decoration-element flower">🌸</span>
                    </div>
                    <h2 class="cute-title">Your Profile</h2>
                    <p class="cute-subtitle">Manage your account details and preferences.</p>
                    <form id="profileForm">
                        <div class="input-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" class="cute-input" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" class="cute-input" required>
                        </div>
                        <button type="submit" class="cute-button primary">Update Profile</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
